name: Wikidot new page alert

on:
  schedule:
    - cron: "2-59/5 * * * *"

  workflow_dispatch:

  push:
    branches:
      - main
      
permissions:
  contents: write

concurrency:
  group: wikidot-new-page-alert
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Wikidot RSS and send Discord alert
        env:
          RSS_URL: "http://vocaro.wikidot.com/feed/pages/pagename/recently-translated-lyrics/category/_default/tags/%EB%85%B8%EB%9E%98/order/created_at+desc/limit/100/t/%EB%B3%B4%EC%B9%B4%EB%A1%9C+%EA%B0%80%EC%82%AC+%EC%9C%84%ED%82%A4+%EC%B5%9C%EA%B7%BC+%EA%B0%80%EC%82%AC"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

          STATE_FILE: "seen_pages.json"
          REQUEST_TIMEOUT: "60"

          REQUIRE_CREATION_KEYWORD: "false"
          SEND_ON_FIRST_RUN: "false"

          CREATION_KEYWORDS: "created,new page,page created,created page,생성,새 페이지"
          EXCLUDE_PATTERNS: "/forum/,/system:,/category:,/tag:,/nav:,/admin:"

          DISCORD_USERNAME: "보카로 가사 위키 알림"
          DISCORD_MENTION: ""

        run: python notify_wikidot.py

      - name: Commit seen state
        run: |
          if [[ -n "$(git status --porcelain seen_pages.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add seen_pages.json
            git commit -m "Update Wikidot RSS seen state"
            git push
          else
            echo "No state changes to commit."
          fi
